<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kwiaciarnia Stokrotka | Poddębice</title>
    <meta name="description" content="Kwiaciarnia Stokrotka w Poddębicach - piękne bukiety z dostawą.">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="container nav-flex">
            <div class="logo">Stokrotka</div>
            <div class="nav-links">
                <button class="nav-tab-btn active" data-tab="produkty">Produkty</button>
                <button class="nav-tab-btn" data-tab="galeria">Galeria</button>
                <button class="nav-tab-btn" data-tab="kontakt">Kontakt</button>
                <button id="dark-mode-toggle" onclick="toggleDarkMode()"><i class="fa-solid fa-moon"></i></button>
            </div>
            <div class="cart-icon" onclick="toggleCart()">
                <i class="fa-solid fa-basket-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="produkty" class="tab-content active">
            <div class="products-grid" id="products-container">
                </div>
        </section>

        <section id="galeria" class="tab-content">
            <div class="gallery-grid">
                <img src="assets/bukiet1.jpg" alt="Galeria 1">
                <img src="assets/bukiet2.jpg" alt="Galeria 2">
                <img src="assets/bukiet3.jpg" alt="Galeria 3">
            </div>
        </section>

        <section id="kontakt" class="tab-content">
            <div class="contact-grid">
                <div class="contact-info">
                    <h2>Znajdź nas</h2>
                    <p><i class="fa-solid fa-location-dot"></i> ul. Przykładowa 1, Poddębice</p>
                    <p><i class="fa-solid fa-phone"></i> +48 123 456 789</p>
                    <div class="map-container">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2463.3456!2d18.95!3d51.89!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNTHCsDUzJzI0LjAiTiAxOMKwNTcnMDAuMCJF!5e0!3m2!1spl!2spl!4v123456789" 
                            width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy">
                        </iframe>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Twój Koszyk</h3>
            <button onclick="toggleCart()">&times;</button>
        </div>
        <div id="cart-items"></div>
        
        <div class="cart-addons">
            <h4>Dodaj coś słodkiego:</h4>
            <button onclick="addAddon('Czekoladki Merci', 25)" class="btn-addon">+ Merci (25 PLN)</button>
        </div>

        <div class="cart-footer">
            <div class="total">Suma: <span id="cart-total">0</span> PLN</div>
            <button class="btn btn-order" onclick="openOrderForm()">ZAMÓW TERAZ</button>
        </div>
    </div>

    <div id="fomo-bar" class="fomo-bar">
        <div class="fomo-content">
            <span class="fomo-text">🌿 Zamów w ciągu <b id="fomo-timer">00:00:00</b>, a dostarczymy kwiaty <b>jeszcze dzisiaj!</b></span>
        </div>
    </div>

    <div id="product-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <img id="modal-img" src="" alt="Produkt">
            <h3 id="modal-title"></h3>
            <p id="modal-desc"></p>
            <p class="price" id="modal-price"></p>
            <button class="btn" id="modal-add-btn">DODAJ DO KOSZYKA</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
